<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mini DRS - Cricket Replay System (Fixed 5min Buffer)</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 16px;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0f1e;
            color: #f0f3fa;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .live-card {
            background: #121826;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 12px 24px rgba(0,0,0,0.4);
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .camera-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 18px;
            background: #0b0f17;
            border-bottom: 1px solid #2a2f3c;
            flex-wrap: wrap;
            gap: 10px;
        }

        .title {
            font-weight: 600;
            font-size: 1.2rem;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .record-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1e2434;
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
        }

        .buffer-info {
            font-family: monospace;
            font-size: 0.75rem;
            background: #00000055;
            padding: 4px 8px;
            border-radius: 20px;
        }

        .led {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #2ecc71;
            box-shadow: 0 0 5px #2ecc71;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.9);}
            100% { opacity: 1; transform: scale(1.2);}
        }

        .video-wrapper {
            position: relative;
            background: #000;
            width: 100%;
            aspect-ratio: 16 / 9;
        }

        #liveVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(1);
        }

        .controls {
            padding: 14px;
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        button {
            background: #2c3e66;
            border: none;
            padding: 10px 20px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            touch-action: manipulation;
        }

        button:active {
            transform: scale(0.96);
            background: #1f2c48;
        }

        .review-btn {
            background: #e67e22;
            font-weight: bold;
        }

        .review-btn:disabled {
            opacity: 0.6;
            transform: none;
        }

        .replay-card {
            background: #121826;
            border-radius: 28px;
            margin-top: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .replay-header {
            padding: 12px 18px;
            background: #0b0f17;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #replayPlayer {
            width: 100%;
            background: #000;
            aspect-ratio: 16 / 9;
            object-fit: contain;
        }

        .frame-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 12px;
            background: #0e121c;
            flex-wrap: wrap;
        }

        .frame-btn {
            background: #1e2a3a;
            padding: 8px 18px;
            font-size: 0.9rem;
        }

        .time-info {
            text-align: center;
            font-size: 0.75rem;
            padding: 8px;
            color: #9aa4bf;
            font-family: monospace;
        }

        .error-msg {
            background: #c0392b;
            margin: 12px;
            padding: 10px;
            border-radius: 20px;
            text-align: center;
            font-size: 0.8rem;
        }

        .success-msg {
            background: #27ae60;
            margin: 12px;
            padding: 10px;
            border-radius: 20px;
            text-align: center;
            font-size: 0.8rem;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 20px;
            opacity: 0.6;
        }

        @media (max-width: 600px) {
            body {
                padding: 12px;
            }
            button {
                padding: 8px 18px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="live-card">
        <div class="camera-header">
            <div class="title">📹 DRS Review System</div>
            <div class="record-indicator">
                <span class="led"></span>
                <span>RECORDING</span>
                <span class="buffer-info" id="bufferInfo">0s / 300s</span>
            </div>
        </div>
        <div class="video-wrapper">
            <video id="liveVideo" autoplay playsinline muted></video>
        </div>
        <div class="controls">
            <button id="reviewBtn" class="review-btn">⚡ REVIEW LAST 5min</button>
        </div>
    </div>

    <div class="replay-card" id="replayCard" style="display: none;">
        <div class="replay-header">
            <span>🎬 REPLAY (Frame by Frame)</span>
            <span id="replayDuration" style="font-size: 0.75rem; opacity: 0.8;"></span>
        </div>
        <video id="replayPlayer" controls playsinline></video>
        <div class="frame-controls">
            <button id="prevFrameBtn" class="frame-btn">⏪ Prev Frame</button>
            <button id="nextFrameBtn" class="frame-btn">Next Frame ⏩</button>
        </div>
        <div class="time-info" id="frameTimeInfo">⏱️ Frame: -- / --</div>
    </div>
    <div id="messageDiv" style="display: none;" class="error-msg"></div>
    <footer>⚡ Rolling buffer (last 5 min) | Continuous recording | Frame stepping support</footer>
</div>

<script>
    (function() {
        // DOM Elements
        const liveVideo = document.getElementById('liveVideo');
        const reviewBtn = document.getElementById('reviewBtn');
        const replayPlayer = document.getElementById('replayPlayer');
        const replayCard = document.getElementById('replayCard');
        const prevFrameBtn = document.getElementById('prevFrameBtn');
        const nextFrameBtn = document.getElementById('nextFrameBtn');
        const frameTimeInfo = document.getElementById('frameTimeInfo');
        const bufferInfo = document.getElementById('bufferInfo');
        const replayDurationSpan = document.getElementById('replayDuration');
        const messageDiv = document.getElementById('messageDiv');

        // Recording variables
        let mediaRecorder = null;
        let recordedChunks = [];        // Array to store video chunks
        let totalBufferDuration = 0;    // Total duration in seconds
        let stream = null;
        let recordingStartTime = null;
        let currentSessionId = null;
        
        const MAX_BUFFER_SECONDS = 300; // 5 minutes
        
        // Frame stepping variables
        let currentReplayVideo = null;
        
        // Helper: Show message
        function showMessage(msg, isError = true) {
            messageDiv.textContent = msg;
            messageDiv.className = isError ? 'error-msg' : 'success-msg';
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }
        
        // Update buffer info display
        function updateBufferDisplay() {
            const remaining = Math.max(0, MAX_BUFFER_SECONDS - totalBufferDuration);
            bufferInfo.textContent = `${Math.floor(totalBufferDuration)}s / ${MAX_BUFFER_SECONDS}s (${Math.floor(remaining)}s left)`;
        }
        
        // Remove oldest chunks to maintain 5 minute buffer
        function maintainBufferLimit() {
            while (totalBufferDuration > MAX_BUFFER_SECONDS && recordedChunks.length > 0) {
                const oldestChunk = recordedChunks.shift();
                totalBufferDuration -= oldestChunk.duration;
                // Revoke object URL to free memory
                if (oldestChunk.url) {
                    URL.revokeObjectURL(oldestChunk.url);
                }
            }
            updateBufferDisplay();
        }
        
        // Add new chunk to buffer
        function addChunkToBuffer(blob, duration) {
            if (!blob || blob.size === 0) return;
            
            const url = URL.createObjectURL(blob);
            recordedChunks.push({
                blob: blob,
                url: url,
                duration: duration,
                timestamp: Date.now()
            });
            
            totalBufferDuration += duration;
            maintainBufferLimit();
        }
        
        // Combine all buffered chunks into a single video
        async function combineVideoChunks() {
            if (recordedChunks.length === 0) {
                throw new Error("No video data available. Please wait for recording.");
            }
            
            // For MP4 chunks from MediaRecorder, we need to create a sequence
            // Since direct concatenation doesn't work, we'll use a different approach:
            // Create a new MediaSource or use the fact that we have a continuous recording
            // Actually, the chunks are from the same recording session and can be played sequentially
            // But for a single video file, we need to combine them properly
            
            // Alternative: Create a single blob from all chunks
            // However, MP4 chunks from timeslice need proper concatenation
            // We'll use the blob array and create a single blob
            const blobs = recordedChunks.map(chunk => chunk.blob);
            const combinedBlob = new Blob(blobs, { type: 'video/mp4' });
            
            // Verify the combined blob is playable
            return combinedBlob;
        }
        
        // Setup MediaRecorder with timeslice to get chunks every 2 seconds
        function setupMediaRecorder(mediaStream) {
            try {
                // Check supported MIME types
                const mimeTypes = [
                    'video/mp4',
                    'video/webm;codecs=h264',
                    'video/webm;codecs=vp8',
                    'video/webm'
                ];
                
                let selectedMime = '';
                for (let mime of mimeTypes) {
                    if (MediaRecorder.isTypeSupported(mime)) {
                        selectedMime = mime;
                        break;
                    }
                }
                
                const options = selectedMime ? { mimeType: selectedMime } : {};
                mediaRecorder = new MediaRecorder(mediaStream, options);
                
                let chunkStartTime = null;
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data && event.data.size > 0) {
                        const chunkEndTime = Date.now() / 1000;
                        let duration = 2.0; // Default duration
                        
                        if (chunkStartTime) {
                            duration = chunkEndTime - chunkStartTime;
                        }
                        chunkStartTime = chunkEndTime;
                        
                        // Add chunk to circular buffer
                        addChunkToBuffer(event.data, duration);
                    }
                };
                
                mediaRecorder.onerror = (event) => {
                    console.error('MediaRecorder error:', event);
                    showMessage('Recording error occurred');
                };
                
                // Start recording with timeslice of 2000ms (2 seconds)
                mediaRecorder.start(2000);
                recordingStartTime = Date.now() / 1000;
                chunkStartTime = recordingStartTime;
                
                return true;
            } catch (err) {
                console.error('Failed to setup MediaRecorder:', err);
                showMessage('Failed to setup recorder: ' + err.message);
                return false;
            }
        }
        
        // Initialize camera
        async function initCamera() {
            try {
                // Try rear camera first
                const constraints = {
                    video: {
                        facingMode: { exact: "environment" },
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                };
                
                try {
                    stream = await navigator.mediaDevices.getUserMedia(constraints);
                } catch (err) {
                    console.warn('Rear camera failed, trying default:', err);
                    stream = await navigator.mediaDevices.getUserMedia({ 
                        video: true, 
                        audio: false 
                    });
                }
                
                liveVideo.srcObject = stream;
                await liveVideo.play();
                
                // Setup MediaRecorder with the stream
                if (setupMediaRecorder(stream)) {
                    showMessage('Camera active - Recording last 5 minutes', false);
                    updateBufferDisplay();
                }
                
                return true;
            } catch (err) {
                console.error('Camera error:', err);
                showMessage('Cannot access camera: ' + err.message);
                return false;
            }
        }
        
        // Review functionality
        async function reviewLast5Minutes() {
            if (recordedChunks.length === 0) {
                showMessage('Buffer is empty. Please wait at least 5-10 seconds for recording.');
                return;
            }
            
            try {
                reviewBtn.disabled = true;
                reviewBtn.textContent = "⏳ Creating replay...";
                
                // Combine all chunks
                const combinedBlob = await combineVideoChunks();
                
                if (combinedBlob.size === 0) {
                    throw new Error('Created video is empty');
                }
                
                // Create URL and load into player
                const videoURL = URL.createObjectURL(combinedBlob);
                
                // Clean up old URL if exists
                if (replayPlayer.src && replayPlayer.src.startsWith('blob:')) {
                    URL.revokeObjectURL(replayPlayer.src);
                }
                
                replayPlayer.src = videoURL;
                replayCard.style.display = 'block';
                
                // Show total duration once metadata loads
                replayPlayer.onloadedmetadata = () => {
                    const duration = replayPlayer.duration;
                    replayDurationSpan.textContent = `Duration: ${Math.floor(duration)}s / ${Math.floor(totalBufferDuration)}s buffer`;
                    showMessage(`Replay ready: ${Math.floor(duration)} seconds`, false);
                    
                    // Setup frame stepping
                    setupFrameStepping(replayPlayer);
                };
                
                // Auto-play the replay
                await replayPlayer.play();
                
                // Scroll to replay
                replayCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
                
                reviewBtn.disabled = false;
                reviewBtn.textContent = "⚡ REVIEW LAST 5min";
                
            } catch (err) {
                console.error('Review error:', err);
                showMessage('Failed to create replay: ' + err.message);
                reviewBtn.disabled = false;
                reviewBtn.textContent = "⚡ REVIEW LAST 5min";
            }
        }
        
        // Frame stepping functionality
        function setupFrameStepping(videoElement) {
            currentReplayVideo = videoElement;
            
            // Remove old listeners and add new ones
            const newPrev = prevFrameBtn.cloneNode(true);
            const newNext = nextFrameBtn.cloneNode(true);
            prevFrameBtn.parentNode.replaceChild(newPrev, prevFrameBtn);
            nextFrameBtn.parentNode.replaceChild(newNext, nextFrameBtn);
            
            const finalPrev = document.getElementById('prevFrameBtn');
            const finalNext = document.getElementById('nextFrameBtn');
            
            function updateFrameInfo() {
                if (!videoElement.duration || isNaN(videoElement.duration)) {
                    frameTimeInfo.textContent = `⏱️ Frame: -- / --`;
                    return;
                }
                
                const fps = 30; // Standard fps assumption
                const totalFrames = Math.floor(videoElement.duration * fps);
                const currentFrame = Math.floor(videoElement.currentTime * fps);
                frameTimeInfo.textContent = `⏱️ Frame: ${currentFrame + 1} / ${totalFrames}  |  Time: ${videoElement.currentTime.toFixed(2)}s`;
            }
            
            function goToPreviousFrame() {
                if (!videoElement.duration) return;
                const frameTime = 1 / 30;
                let newTime = videoElement.currentTime - frameTime;
                if (newTime < 0) newTime = 0;
                videoElement.currentTime = newTime;
                videoElement.pause();
                updateFrameInfo();
            }
            
            function goToNextFrame() {
                if (!videoElement.duration) return;
                const frameTime = 1 / 30;
                let newTime = videoElement.currentTime + frameTime;
                if (newTime > videoElement.duration) newTime = videoElement.duration;
                videoElement.currentTime = newTime;
                videoElement.pause();
                updateFrameInfo();
            }
            
            finalPrev.onclick = (e) => {
                e.preventDefault();
                goToPreviousFrame();
            };
            
            finalNext.onclick = (e) => {
                e.preventDefault();
                goToNextFrame();
            };
            
            videoElement.addEventListener('timeupdate', updateFrameInfo);
            videoElement.addEventListener('seeked', updateFrameInfo);
            
            if (videoElement.readyState >= 1) {
                updateFrameInfo();
            } else {
                videoElement.addEventListener('loadedmetadata', updateFrameInfo, { once: true });
            }
        }
        
        // Cleanup function
        function cleanup() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            recordedChunks.forEach(chunk => {
                if (chunk.url) URL.revokeObjectURL(chunk.url);
            });
            recordedChunks = [];
        }
        
        // Handle page visibility
        function handleVisibilityChange() {
            if (document.hidden) {
                // Optionally pause recording to save resources
                if (mediaRecorder && mediaRecorder.state === 'recording') {
                    mediaRecorder.pause();
                }
            } else {
                if (mediaRecorder && mediaRecorder.state === 'paused') {
                    mediaRecorder.resume();
                }
            }
        }
        
        // Initialize everything
        async function init() {
            await initCamera();
            
            // Periodic buffer cleanup
            setInterval(() => {
                maintainBufferLimit();
            }, 10000);
        }
        
        // Event listeners
        reviewBtn.addEventListener('click', reviewLast5Minutes);
        document.addEventListener('visibilitychange', handleVisibilityChange);
        window.addEventListener('beforeunload', cleanup);
        
        // Start the system
        init().catch(err => {
            console.error('Init error:', err);
            showMessage('Failed to initialize: ' + err.message);
        });
        
        console.log('Mini DRS System initialized - Rolling 5 minute buffer active');
    })();
</script>
</body>
</html>
