<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mini DRS - Professional Cricket Replay System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #0a1a2a 100%);
            min-height: 100vh;
            color: #fff;
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .header h1 {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            background: linear-gradient(135deg, #e67e22, #f39c12);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.8;
            font-size: clamp(0.8rem, 3vw, 1rem);
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        @media (min-width: 1024px) {
            .grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* Cards */
        .card {
            background: rgba(18, 24, 38, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .card-header {
            padding: 20px 25px;
            background: linear-gradient(135deg, rgba(230,126,34,0.2), rgba(243,156,18,0.1));
            border-bottom: 2px solid rgba(230,126,34,0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .card-header h2 {
            font-size: clamp(1.1rem, 4vw, 1.5rem);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Status Indicator */
        .status {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0,0,0,0.5);
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 0.9rem;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #e74c3c;
            animation: pulse 1.5s infinite;
        }

        .status-dot.active {
            background: #2ecc71;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        /* Video Container */
        .video-container {
            position: relative;
            background: #000;
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
        }

        #liveVideo, #replayPlayer {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #replayPlayer {
            object-fit: contain;
            background: #000;
        }

        /* Controls */
        .controls-section {
            padding: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(5px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #e67e22, #f39c12);
            color: white;
            box-shadow: 0 4px 15px rgba(230,126,34,0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(230,126,34,0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }

        .btn-secondary {
            background: rgba(52, 73, 94, 0.8);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-secondary:hover {
            background: rgba(52, 73, 94, 1);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Buffer Info */
        .buffer-info {
            padding: 15px 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            margin: 15px;
            text-align: center;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e67e22, #f39c12);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 10px;
        }

        /* Frame Controls */
        .frame-controls {
            padding: 20px;
            background: rgba(0,0,0,0.3);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }

        .frame-btn-group {
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.5);
            padding: 8px 15px;
            border-radius: 60px;
            align-items: center;
        }

        .frame-btn {
            background: rgba(230,126,34,0.2);
            border: 1px solid rgba(230,126,34,0.5);
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            font-weight: 600;
        }

        .frame-btn:hover {
            background: rgba(230,126,34,0.4);
            transform: scale(1.05);
        }

        .time-info {
            text-align: center;
            padding: 15px;
            font-family: monospace;
            font-size: 0.9rem;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            margin: 15px;
        }

        /* Message */
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 50px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            animation: slideIn 0.3s ease;
            max-width: 90%;
            word-wrap: break-word;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            .btn {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
            
            .frame-btn {
                padding: 8px 16px;
                font-size: 0.85rem;
            }
            
            .card-header {
                padding: 15px;
            }
        }

        @media (max-width: 480px) {
            .frame-controls {
                flex-direction: column;
                align-items: center;
            }
            
            .frame-btn-group {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🏏 DRS Review System</h1>
        <p>Professional Cricket Replay Analysis | Rolling 5-Minute Buffer | Frame-by-Frame Review</p>
    </div>

    <div class="grid">
        <!-- Live Camera Section -->
        <div class="card">
            <div class="card-header">
                <h2>📹 Live Feed</h2>
                <div class="status">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">Stopped</span>
                </div>
            </div>
            <div class="video-container">
                <video id="liveVideo" autoplay playsinline muted></video>
            </div>
            <div class="controls-section">
                <button id="startBtn" class="btn btn-primary">▶️ Start Recording</button>
                <button id="stopBtn" class="btn btn-danger" disabled>⏹️ Stop Recording</button>
                <button id="reviewBtn" class="btn btn-primary" disabled>⚡ Review Last 5min</button>
            </div>
            <div class="buffer-info">
                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <span>📊 Buffer Status</span>
                    <span id="bufferInfo">0s / 300s</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="bufferProgress"></div>
                </div>
            </div>
        </div>

        <!-- Replay Section -->
        <div class="card" id="replayCard" style="display: none;">
            <div class="card-header">
                <h2>🎬 Replay Analysis</h2>
                <span id="replayDuration" style="font-size: 0.85rem; opacity: 0.8;"></span>
            </div>
            <div class="video-container">
                <video id="replayPlayer" controls playsinline></video>
            </div>
            <div class="frame-controls">
                <div class="frame-btn-group">
                    <button id="prevFrameBtn" class="frame-btn">⏪ Prev Frame</button>
                    <button id="nextFrameBtn" class="frame-btn">Next Frame ⏩</button>
                </div>
                <div class="frame-btn-group">
                    <button id="fastPrevBtn" class="frame-btn">⏪⏪ Fast Prev (0.5s)</button>
                    <button id="fastNextBtn" class="frame-btn">Fast Next (0.5s) ⏩⏩</button>
                </div>
            </div>
            <div class="time-info" id="frameTimeInfo">
                ⏱️ Frame: -- / -- | Time: --:--
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // DOM Elements
        const liveVideo = document.getElementById('liveVideo');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const reviewBtn = document.getElementById('reviewBtn');
        const replayPlayer = document.getElementById('replayPlayer');
        const replayCard = document.getElementById('replayCard');
        const prevFrameBtn = document.getElementById('prevFrameBtn');
        const nextFrameBtn = document.getElementById('nextFrameBtn');
        const fastPrevBtn = document.getElementById('fastPrevBtn');
        const fastNextBtn = document.getElementById('fastNextBtn');
        const frameTimeInfo = document.getElementById('frameTimeInfo');
        const bufferInfo = document.getElementById('bufferInfo');
        const bufferProgress = document.getElementById('bufferProgress');
        const replayDurationSpan = document.getElementById('replayDuration');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        // Recording variables
        let mediaRecorder = null;
        let recordedChunks = [];
        let totalBufferDuration = 0;
        let stream = null;
        let isRecording = false;
        
        const MAX_BUFFER_SECONDS = 300;
        let currentReplayVideo = null;
        let messageTimeout = null;

        // Show message
        function showMessage(msg, isError = false) {
            const existingMsg = document.querySelector('.message');
            if (existingMsg) existingMsg.remove();
            
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            messageDiv.style.background = isError ? 'rgba(231, 76, 60, 0.95)' : 'rgba(46, 204, 113, 0.95)';
            messageDiv.textContent = msg;
            document.body.appendChild(messageDiv);
            
            if (messageTimeout) clearTimeout(messageTimeout);
            messageTimeout = setTimeout(() => {
                if (messageDiv) messageDiv.remove();
            }, 3000);
        }

        // Update buffer display
        function updateBufferDisplay() {
            const percentage = (totalBufferDuration / MAX_BUFFER_SECONDS) * 100;
            bufferInfo.textContent = `${Math.floor(totalBufferDuration)}s / ${MAX_BUFFER_SECONDS}s`;
            bufferProgress.style.width = `${Math.min(100, percentage)}%`;
        }

        // Maintain buffer limit
        function maintainBufferLimit() {
            while (totalBufferDuration > MAX_BUFFER_SECONDS && recordedChunks.length > 0) {
                const oldestChunk = recordedChunks.shift();
                totalBufferDuration -= oldestChunk.duration;
                if (oldestChunk.url) {
                    URL.revokeObjectURL(oldestChunk.url);
                }
            }
            updateBufferDisplay();
        }

        // Add chunk to buffer
        function addChunkToBuffer(blob, duration) {
            if (!blob || blob.size === 0) return;
            
            const url = URL.createObjectURL(blob);
            recordedChunks.push({
                blob: blob,
                url: url,
                duration: duration,
                timestamp: Date.now()
            });
            
            totalBufferDuration += duration;
            maintainBufferLimit();
            
            // Enable review button if we have at least 5 seconds of video
            if (totalBufferDuration >= 5 && reviewBtn.disabled) {
                reviewBtn.disabled = false;
            }
        }

        // Combine chunks
        async function combineVideoChunks() {
            if (recordedChunks.length === 0) {
                throw new Error("No video data available");
            }
            
            const blobs = recordedChunks.map(chunk => chunk.blob);
            return new Blob(blobs, { type: 'video/mp4' });
        }

        // Setup MediaRecorder
        function setupMediaRecorder(mediaStream) {
            try {
                const mimeTypes = [
                    'video/mp4',
                    'video/webm;codecs=h264',
                    'video/webm;codecs=vp8',
                    'video/webm'
                ];
                
                let selectedMime = '';
                for (let mime of mimeTypes) {
                    if (MediaRecorder.isTypeSupported(mime)) {
                        selectedMime = mime;
                        break;
                    }
                }
                
                const options = selectedMime ? { mimeType: selectedMime } : {};
                mediaRecorder = new MediaRecorder(mediaStream, options);
                
                let chunkStartTime = null;
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data && event.data.size > 0) {
                        const chunkEndTime = Date.now() / 1000;
                        let duration = 2.0;
                        
                        if (chunkStartTime) {
                            duration = chunkEndTime - chunkStartTime;
                        }
                        chunkStartTime = chunkEndTime;
                        
                        addChunkToBuffer(event.data, duration);
                    }
                };
                
                mediaRecorder.onerror = (event) => {
                    console.error('MediaRecorder error:', event);
                    showMessage('Recording error occurred', true);
                };
                
                mediaRecorder.start(2000);
                chunkStartTime = Date.now() / 1000;
                
                return true;
            } catch (err) {
                console.error('Failed to setup MediaRecorder:', err);
                showMessage('Failed to setup recorder: ' + err.message, true);
                return false;
            }
        }

        // Start recording
        async function startRecording() {
            if (isRecording) return;
            
            try {
                // Request camera access
                const constraints = {
                    video: {
                        facingMode: { exact: "environment" },
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                };
                
                try {
                    stream = await navigator.mediaDevices.getUserMedia(constraints);
                } catch (err) {
                    console.warn('Rear camera failed, trying default:', err);
                    stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                }
                
                liveVideo.srcObject = stream;
                await liveVideo.play();
                
                // Setup recorder
                if (setupMediaRecorder(stream)) {
                    isRecording = true;
                    startBtn.disabled = true;
                    stopBtn.disabled = false;
                    statusDot.classList.add('active');
                    statusText.textContent = 'Recording';
                    showMessage('🎥 Recording started - Rolling 5-minute buffer active', false);
                }
                
            } catch (err) {
                console.error('Start recording error:', err);
                showMessage('Cannot access camera: ' + err.message, true);
            }
        }

        // Stop recording
        function stopRecording() {
            if (!isRecording) return;
            
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
            
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            
            isRecording = false;
            startBtn.disabled = false;
            stopBtn.disabled = true;
            reviewBtn.disabled = false;
            statusDot.classList.remove('active');
            statusText.textContent = 'Stopped';
            liveVideo.srcObject = null;
            
            showMessage('⏹️ Recording stopped - Buffer preserved for review', false);
        }

        // Review functionality
        async function reviewLast5Minutes() {
            if (recordedChunks.length === 0) {
                showMessage('Buffer is empty. Please record some video first.', true);
                return;
            }
            
            try {
                reviewBtn.disabled = true;
                reviewBtn.textContent = "⏳ Creating replay...";
                
                const combinedBlob = await combineVideoChunks();
                
                if (combinedBlob.size === 0) {
                    throw new Error('Created video is empty');
                }
                
                const videoURL = URL.createObjectURL(combinedBlob);
                
                if (replayPlayer.src && replayPlayer.src.startsWith('blob:')) {
                    URL.revokeObjectURL(replayPlayer.src);
                }
                
                replayPlayer.src = videoURL;
                replayCard.style.display = 'block';
                
                replayPlayer.onloadedmetadata = () => {
                    const duration = replayPlayer.duration;
                    replayDurationSpan.textContent = `Duration: ${Math.floor(duration)}s`;
                    showMessage(`✅ Replay ready: ${Math.floor(duration)} seconds available`, false);
                    setupFrameStepping(replayPlayer);
                };
                
                await replayPlayer.play();
                replayCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
                
                reviewBtn.disabled = false;
                reviewBtn.textContent = "⚡ Review Last 5min";
                
            } catch (err) {
                console.error('Review error:', err);
                showMessage('Failed to create replay: ' + err.message, true);
                reviewBtn.disabled = false;
                reviewBtn.textContent = "⚡ Review Last 5min";
            }
        }

        // Frame stepping functionality
        function setupFrameStepping(videoElement) {
            currentReplayVideo = videoElement;
            
            function updateFrameInfo() {
                if (!videoElement.duration || isNaN(videoElement.duration)) {
                    frameTimeInfo.textContent = `⏱️ Frame: -- / -- | Time: --:--`;
                    return;
                }
                
                const fps = 30;
                const totalFrames = Math.floor(videoElement.duration * fps);
                const currentFrame = Math.floor(videoElement.currentTime * fps);
                const minutes = Math.floor(videoElement.currentTime / 60);
                const seconds = Math.floor(videoElement.currentTime % 60);
                
                frameTimeInfo.textContent = `⏱️ Frame: ${currentFrame + 1} / ${totalFrames} | Time: ${minutes}:${seconds.toString().padStart(2, '0')}`;
            }
            
            function goToPreviousFrame() {
                if (!videoElement.duration) return;
                const frameTime = 1 / 30;
                let newTime = videoElement.currentTime - frameTime;
                if (newTime < 0) newTime = 0;
                videoElement.currentTime = newTime;
                videoElement.pause();
                updateFrameInfo();
            }
            
            function goToNextFrame() {
                if (!videoElement.duration) return;
                const frameTime = 1 / 30;
                let newTime = videoElement.currentTime + frameTime;
                if (newTime > videoElement.duration) newTime = videoElement.duration;
                videoElement.currentTime = newTime;
                videoElement.pause();
                updateFrameInfo();
            }
            
            function goToFastPrev() {
                if (!videoElement.duration) return;
                let newTime = videoElement.currentTime - 0.5;
                if (newTime < 0) newTime = 0;
                videoElement.currentTime = newTime;
                videoElement.pause();
                updateFrameInfo();
                showMessage('⏪ Jumped back 0.5 seconds', false);
            }
            
            function goToFastNext() {
                if (!videoElement.duration) return;
                let newTime = videoElement.currentTime + 0.5;
                if (newTime > videoElement.duration) newTime = videoElement.duration;
                videoElement.currentTime = newTime;
                videoElement.pause();
                updateFrameInfo();
                showMessage('⏩ Jumped forward 0.5 seconds', false);
            }
            
            // Remove old listeners and add new ones
            const newPrev = prevFrameBtn.cloneNode(true);
            const newNext = nextFrameBtn.cloneNode(true);
            const newFastPrev = fastPrevBtn.cloneNode(true);
            const newFastNext = fastNextBtn.cloneNode(true);
            
            prevFrameBtn.parentNode.replaceChild(newPrev, prevFrameBtn);
            nextFrameBtn.parentNode.replaceChild(newNext, nextFrameBtn);
            fastPrevBtn.parentNode.replaceChild(newFastPrev, fastPrevBtn);
            fastNextBtn.parentNode.replaceChild(newFastNext, fastNextBtn);
            
            document.getElementById('prevFrameBtn').onclick = (e) => { e.preventDefault(); goToPreviousFrame(); };
            document.getElementById('nextFrameBtn').onclick = (e) => { e.preventDefault(); goToNextFrame(); };
            document.getElementById('fastPrevBtn').onclick = (e) => { e.preventDefault(); goToFastPrev(); };
            document.getElementById('fastNextBtn').onclick = (e) => { e.preventDefault(); goToFastNext(); };
            
            videoElement.addEventListener('timeupdate', updateFrameInfo);
            videoElement.addEventListener('seeked', updateFrameInfo);
            
            if (videoElement.readyState >= 1) {
                updateFrameInfo();
            } else {
                videoElement.addEventListener('loadedmetadata', updateFrameInfo, { once: true });
            }
        }

        // Cleanup
        function cleanup() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            recordedChunks.forEach(chunk => {
                if (chunk.url) URL.revokeObjectURL(chunk.url);
            });
        }

        // Event listeners
        startBtn.addEventListener('click', startRecording);
        stopBtn.addEventListener('click', stopRecording);
        reviewBtn.addEventListener('click', reviewLast5Minutes);
        window.addEventListener('beforeunload', cleanup);
        
        // Initial state
        statusDot.classList.remove('active');
        statusText.textContent = 'Stopped';
        
        console.log('Mini DRS System Ready - Professional Cricket Review System');
    })();
</script>
</body>
</html>
